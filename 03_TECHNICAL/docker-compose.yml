version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: fluxus_db
    restart: always
    environment:
      POSTGRES_DB: fluxus_orchestration
      POSTGRES_USER: fluxus_admin
      POSTGRES_PASSWORD: fluxus_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  audit-server:
    image: python:3.11-slim
    container_name: fluxus_audit_server
    restart: always
    environment:
      DATABASE_URL: postgresql://fluxus_admin:fluxus_pass@postgres:5432/fluxus_orchestration
    ports:
      - "8080:8080"
    working_dir: /app
    volumes:
      - .:/app
    command: python app.py

volumes:
  postgres_data:
